<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>TWTA Fail 복구 프로시저 — 운용 교육 자료</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<style>
:root{
  --bg:#070c18; --panel:#0f1a33; --panel2:#162340; --ink:#e6ecff; --sub:#97a4c7;
  --gold:#ffb23a; --coral:#ff6f8a; --green:#4ddb88; --red:#ff4d5e; --cyan:#3de0ff;
  --line:#1e2e55; --mono:"SF Mono","Menlo","Consolas",monospace;
}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#050914,#0a1226 40%);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Noto Sans KR",sans-serif;min-height:100vh}
header{padding:18px 28px;border-bottom:1px solid var(--line);display:flex;
  justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap;background:#080e1c}
header h1{margin:0;font-size:20px;font-weight:700;letter-spacing:-.01em}
header small{color:var(--sub)}
.chip{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;
  border:1px solid #2a3a63;background:#14203b;color:#cfe0ff;margin-left:6px}

.stepper{display:flex;gap:6px;padding:16px 28px 0;flex-wrap:wrap}
.stepper button{flex:1 1 140px;min-width:140px;padding:10px 12px;background:var(--panel);
  border:1px solid var(--line);color:var(--ink);border-radius:10px;cursor:pointer;
  font-size:13px;font-weight:600;transition:all .15s;text-align:left}
.stepper button:hover{border-color:var(--gold);transform:translateY(-1px)}
.stepper button.active{background:linear-gradient(180deg,#27375f,#18223f);border-color:var(--gold);
  color:var(--gold);box-shadow:0 4px 12px rgba(255,178,58,.15)}
.stepper b{display:block;font-size:11px;color:var(--sub);font-weight:600;letter-spacing:.05em}
.stepper.active b{color:var(--gold)}

main{display:grid;grid-template-columns:1.35fr 1fr;gap:20px;padding:20px 28px}
@media (max-width:1100px){main{grid-template-columns:1fr}}

.viz{background:var(--panel);border:1px solid var(--line);border-radius:14px;overflow:hidden;
  display:flex;flex-direction:column}
.viz-header{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center}
.viz-header b{font-size:14px;color:var(--gold);font-weight:700}
.viz-img{flex:1;background:#060a15;display:flex;align-items:center;justify-content:center;padding:6px;min-height:380px}
.viz-img img{max-width:100%;max-height:540px;display:block;border-radius:8px;box-shadow:0 10px 24px rgba(0,0,0,.4)}
.viz-footer{padding:10px 14px;border-top:1px solid var(--line);font-size:12px;color:var(--sub);
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;
  display:flex;flex-direction:column;gap:14px}
.panel h2{margin:0;font-size:16px;color:var(--gold)}
.panel h3{margin:0;font-size:12px;color:var(--sub);font-weight:600;letter-spacing:.07em;text-transform:uppercase}

.box{background:#0b1530;border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.box.cmd{border-left:3px solid var(--coral)}
.box.tm{border-left:3px solid var(--green)}
.box.oper{border-left:3px solid var(--cyan)}
.box.reason{border-left:3px solid var(--gold)}
.box .hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px;font-weight:700}
.box.cmd .hd{color:var(--coral)}
.box.tm .hd{color:var(--green)}
.box.oper .hd{color:var(--cyan)}
.box.reason .hd{color:var(--gold)}
.box .body{font-size:13px;line-height:1.55}
.box code, code{font-family:var(--mono);font-size:12px;background:#1a2340;color:#e6d98a;
  padding:1px 7px;border-radius:4px;border:1px solid #2a3560}

.legend{display:flex;flex-wrap:wrap;gap:10px;font-size:11px;color:var(--sub)}
.legend i{display:inline-block;width:14px;height:10px;border-radius:3px;margin-right:5px;
  vertical-align:-1px;box-shadow:0 0 6px currentColor}

.nav{display:flex;gap:8px;padding:0 28px 28px}
.nav button{flex:1;padding:12px;background:var(--panel);border:1px solid var(--line);
  color:var(--ink);border-radius:10px;cursor:pointer;font-size:14px;font-weight:600}
.nav button:disabled{opacity:.4;cursor:not-allowed}
.nav button.primary{background:linear-gradient(180deg,#ffb23a,#e08a10);color:#1a0e02;border-color:#ffb23a}

.caution{background:#1a1308;border-left:3px solid var(--gold);padding:10px 12px;border-radius:6px;
  font-size:12px;line-height:1.5;color:#ffe1b0}

.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:12.5px}
.kv .k{color:var(--sub);font-family:var(--mono)}
.kv .v{color:var(--ink)}
</style>
</head>
<body>

<header>
  <div>
    <h1>🛰️ TWTA Fail 복구 프로시저 — 운용 교육 자료</h1>
    <small>Thales SB4000 / Koreasat payload bay · CMD/TM 기반 6단계 절체 시퀀스</small>
  </div>
  <div>
    <span class="chip" style="background:#0f3a20;border-color:#2f6b48;color:#b8f1c8">교육용</span>
    <span class="chip" style="background:#3a1010;border-color:#7a1e1e;color:#ffa0a0">절체 시나리오</span>
    <span class="chip">평균 시간 8~12분</span>
  </div>
</header>

<div class="stepper" id="stepper"></div>

<main>
  <section class="viz">
    <div class="viz-header">
      <b id="vizTitle">STEP</b>
      <span class="legend">
        <span><i style="background:#4ddb88;color:#4ddb88"></i>ACTIVE</span>
        <span><i style="background:#ff4d5e;color:#ff4d5e"></i>FAIL</span>
        <span><i style="background:#ffb23a;color:#ffb23a"></i>WARMUP / HOT RF</span>
        <span><i style="background:#f0d845;color:#f0d845"></i>STANDBY</span>
        <span><i style="background:#3de0ff;color:#3de0ff"></i>REROUTED</span>
        <span><i style="background:#555;color:#777"></i>OFF / DEAD</span>
      </span>
    </div>
    <div class="viz-img">
      <img id="stepImg" src="step1.png" alt="step"/>
    </div>
    <div class="viz-footer">
      <span id="vizTime">T+0:00</span>
      <span id="vizState">상태: 정상 운용</span>
    </div>
  </section>

  <aside class="panel">
    <div>
      <h3>현재 상황</h3>
      <h2 id="sTitle">정상 운용</h2>
      <p id="sDesc" style="margin:6px 0 0;color:var(--sub);font-size:13px;line-height:1.5">모든 중계기가 nominal 상태. TWTA 모니터링 중.</p>
    </div>

    <div class="box cmd">
      <div class="hd">▶ 텔레커맨드 (CMD)</div>
      <div class="body" id="sCmd"></div>
    </div>

    <div class="box tm">
      <div class="hd">◀ 텔레메트리 (TM)</div>
      <div class="body" id="sTm"></div>
    </div>

    <div class="box oper">
      <div class="hd">👨‍🚀 운용자 행동</div>
      <div class="body" id="sOper"></div>
    </div>

    <div class="box reason">
      <div class="hd">💡 왜 이렇게 하는가?</div>
      <div class="body" id="sReason"></div>
    </div>

    <div class="caution" id="sCaution"></div>
  </aside>
</main>

<div class="nav">
  <button id="prev">◀ 이전 단계</button>
  <button id="next" class="primary">다음 단계 ▶</button>
</div>

<script>
const steps = [
  {
    n:1, title:"정상 운용 (Normal Operation)",
    time:"T+0:00",
    state:"정상 운용",
    vizTitle:"STEP 1/6 · 정상 중계기 동작 중",
    desc:"TWTA-1/2/3/4가 각 채널 1~4 서비스 중. TWTA-5/6는 예비 대기(standby).",
    cmd:"<i>(정상 운용 — 별도 명령 없음)</i><br>주기 TM 폴링만 수행",
    tm:"<code>TWTA01..04.STATUS</code> = <b style='color:#4ddb88'>NOMINAL</b><br>"+
       "<code>TWTA01..04.Vk</code> = −7.5 kV<br>"+
       "<code>TWTA01..04.Ihc</code> = within ±5%<br>"+
       "<code>TWTA05,06.STATUS</code> = <b style='color:#f0d845'>STANDBY</b>",
    oper:"지상국 운영자는 실시간 TM 대시보드에서 trending 확인.<br>"+
         "이상 징후 감지 시 자동 알람이 기동됨.",
    reason:"우주는 수리 불가 환경 → 예비(spare) 유닛을 항상 냉대기(cold) 또는 온대기(warm)로 준비. 정상 시 spare는 수명 보전 위해 OFF 유지.",
    caution:"⚠️ 주의 — spare를 너무 자주 켜고 끄면 on/off 사이클 수명이 소진됨. 예비는 불요 가동 지양."
  },
  {
    n:2, title:"고장 감지 (Fail Detection)",
    time:"T+0:00.3",
    state:"🚨 TWTA-4 FAIL — 자동 알람",
    vizTitle:"STEP 2/6 · EPC 과전류 → 자동 shutdown",
    desc:"TWTA-4의 EPC가 내부 보호 회로로 인해 over-current trip. 해당 채널 RF 출력 상실.",
    cmd:"<i>(지상에서 CMD 없음 — 우주에서 자율 발생)</i>",
    tm:"🚨 <b style='color:#ff4d5e'>AUTO_ALARM.TWTA04.EPC_TRIP</b><br>"+
       "<code>TWTA04.EPC.Ihc</code> = <b style='color:#ff4d5e'>OVER_LIMIT (2.3×I_nom)</b><br>"+
       "<code>TWTA04.STATUS</code> = <b style='color:#ff4d5e'>FAIL</b><br>"+
       "<code>TWTA04.Vk</code> = 0 V (EPC auto-shutdown)<br>"+
       "<code>OMUX04.RF_power</code> = <b style='color:#ff4d5e'>−∞ dB (loss)</b><br>"+
       "<code>Downlink_Ch4</code> = <b style='color:#ff4d5e'>NO_CARRIER</b>",
    oper:"1. 자동 알람 팝업 수신 (부저 + 적색 경광)<br>"+
         "2. TM 스냅샷 취득 (사고 분석용)<br>"+
         "3. 지상 수신국 'Ch-4 링크 상태' 문의 확인<br>"+
         "4. 관련 Anomaly Report 번호 할당, 절차서 <code>FDP-TWTA-001</code> Open",
    reason:"EPC 내부 OCP(Over-Current Protection)가 cathode short 등의 catastrophic fail을 막기 위해 먼저 자동 차단. 지상은 <b>뒤늦게</b> 인지하는 구조.",
    caution:"⚠️ 서두르지 말 것. TM 스냅샷 확보가 최우선 — 루트 원인 분석에 필요. 즉시 재기동(retry)은 금지."
  },
  {
    n:3, title:"고장 유닛 격리 (Isolate)",
    time:"T+1:30",
    state:"TWTA-4 safe OFF 확인",
    vizTitle:"STEP 3/6 · EPC 완전 차단, 2차 손상 방지",
    desc:"EPC가 자동 차단되었지만 heater·bleed resistor는 아직 live일 수 있음. 수동 명령으로 완전 OFF.",
    cmd:"<b style='color:#ff6f8a'>TC#</b> <code>TWTA04.EPC.POWER_OFF</code><br>"+
         "<b style='color:#ff6f8a'>TC#</b> <code>TWTA04.HEATER_OFF</code><br>"+
         "<b style='color:#ff6f8a'>TC#</b> <code>TWTA04.CMD_LATCH=SAFE</code>",
    tm:"<code>TWTA04.EPC.POWER</code> = <b>OFF</b><br>"+
       "<code>TWTA04.HEATER.T</code> = 감소 중<br>"+
       "<code>TWTA04.STATUS</code> = <b style='color:#7e8aa0'>OFF_SAFE</b><br>"+
       "<code>TWTA04.Bus_I</code> = 0 A (확인)",
    oper:"1. 각 TC 송신 후 <b>1 TM cycle(1~2초)</b> 대기하며 TM 변화 확인<br>"+
         "2. 모든 항목이 expected 값으로 정착된 뒤 다음 단계 진행<br>"+
         "3. Anomaly Log에 TC/TM 기록 (타임스탬프 포함)",
    reason:"2차 손상 방지. heater만 남아 있으면 cathode poisoning·재기동 실패 위험. 버스 전류도 0인지 확인해 EPC와 FDIR가 모두 동의하는 완전 OFF 상태 달성.",
    caution:"⚠️ TC를 연달아 쏘지 말 것. 각 TC는 TM acknowledge 확인 후 다음 진행. 1분 내 완전 차단 불가 시 <code>PCDU.Level.ISOLATE</code> (상위 차단) 고려."
  },
  {
    n:4, title:"예비 유닛 기동 (Spare Power-up)",
    time:"T+3:00",
    state:"TWTA-5 warmup 진행 중",
    vizTitle:"STEP 4/6 · TWTA-5를 서비스용으로 준비",
    desc:"예비 TWTA-5 전원 투입. heater 예열(3분) 후 고압(-7.5kV) 단계적 인가. <b>급격한 전압 인가는 금지</b>.",
    cmd:"<b style='color:#ff6f8a'>TC#</b> <code>TWTA05.EPC.POWER_ON</code><br>"+
         "<b style='color:#ff6f8a'>TC#</b> <code>TWTA05.HEATER_ON</code><br>"+
         "<b style='color:#ff6f8a'>TC#</b> <code>TWTA05.Vk.RAMP = -7.5kV · step 500V/s</code>",
    tm:"<code>TWTA05.HEATER.T</code>: 상승 (target 180°C ±10)<br>"+
       "<code>TWTA05.Vk</code>: −0 → −7500 V 램핑 진행 중<br>"+
       "<code>TWTA05.Ihc</code>: 미세 증가 (target nominal)<br>"+
       "<code>TWTA05.STATUS</code> = <b style='color:#ffb23a'>WARMUP</b> → <b style='color:#4ddb88'>READY</b>",
    oper:"1. heater T 안정 확인 (3~5분)<br>"+
         "2. Vk ramp 완료 확인<br>"+
         "3. 'TWTA05.READY' 도달 시 절체 단계 진행 준비<br>"+
         "4. 절차서 checkpoint 기록",
    reason:"전자총 cathode는 급격한 가열·전압으로 증발(evaporation) 가속 → 수명 단축. 반드시 <b>단계적 ramp</b>로 인가해야 안정된 emission 확보.",
    caution:"⚠️ Warmup 중 Ihc 급증 시 즉시 abort. cathode short 의심 → TWTA-5도 사용 불가 판정 후 TWTA-6 준비."
  },
  {
    n:5, title:"도파관 절체 (R-Switch Reroute)",
    time:"T+6:30",
    state:"R-switch 회전 중 · 신호 경로 변경",
    vizTitle:"STEP 5/6 · IMUX Ch-4 → TWTA-5 → OMUX-4 절체",
    desc:"입·출력 R-switch를 모터 구동으로 회전시켜 Ch-4 신호 경로를 TWTA-5로 우회. 물리적 도파관이 실제로 회전.",
    cmd:"<b style='color:#ff6f8a'>TC#</b> <code>RSW_IN_S5.POS = 2 (Ch4)</code><br>"+
         "<b style='color:#ff6f8a'>TC#</b> <code>RSW_OUT_R5.POS = 2 (OMUX4)</code><br>"+
         "<b style='color:#ff6f8a'>TC#</b> <code>CONFIRM_SWITCH_POSITION</code>",
    tm:"<code>RSW_IN_S5.POSITION</code> = <b>POS_2</b> (회전 완료 · 30s 소요)<br>"+
       "<code>RSW_IN_S5.MOTOR_I</code> = 0 A (정지 확인)<br>"+
       "<code>RSW_OUT_R5.POSITION</code> = <b>POS_2</b><br>"+
       "<code>RSW_*.HOME_SENSOR</code> = <b>LOCKED</b> (두 위치 모두)",
    oper:"1. R-switch 회전에는 약 25~40초 소요 → 대기<br>"+
         "2. <b>Home sensor LOCKED</b> 확인 후 다음 진행<br>"+
         "3. 회전 중 도중 정지 감지 시 역회전 후 원래 위치 복귀",
    reason:"R-switch는 도파관 내부의 금속 회전자가 물리적으로 회전해 경로를 바꿈. TWTA-4 자리를 비우고 TWTA-5 출력이 OMUX-4에 들어가도록 ring bus 경로 재구성.",
    caution:"⚠️ R-switch는 우주에서 수명이 제한된 기계 부품. 과도한 사이클 금지. 회전 실패(stuck) 시 bypass 또는 반대 방향 재시도 필요."
  },
  {
    n:6, title:"서비스 복구 확인 (Verify & Close)",
    time:"T+8:00",
    state:"✅ 서비스 복구 완료",
    vizTitle:"STEP 6/6 · 다운링크 정상 · 이벤트 로그 기록",
    desc:"TWTA-5가 Ch-4 서비스를 정상 수행 중. OMUX-4 통해 다운링크 회복. 지상 수신 확인 후 복구 완료 선언.",
    cmd:"<b style='color:#ff6f8a'>TC#</b> <code>OMUX04.LEVEL_CHECK</code><br>"+
         "<b style='color:#ff6f8a'>TC#</b> <code>DOWNLINK_VERIFY Ch4</code><br>"+
         "<b style='color:#ff6f8a'>TC#</b> <code>EVENT_LOG.CLOSE Anomaly-XXX</code>",
    tm:"<code>OMUX04.RF_power</code> = <b style='color:#4ddb88'>NOMINAL (+52 dBm)</b><br>"+
       "<code>Downlink_Ch4.EIRP</code> = <b style='color:#4ddb88'>NOMINAL</b><br>"+
       "<code>TWTA05.STATUS</code> = <b style='color:#4ddb88'>ACTIVE</b><br>"+
       "<code>Spare_Remaining</code> = <b style='color:#f0d845'>1</b> (TWTA-6)",
    oper:"1. 지상 수신국에 'Ch-4 RF 정상 수신' 확인 요청<br>"+
         "2. 스펙트럼 분석기로 carrier level/noise 확인<br>"+
         "3. Anomaly Report에 복구 완료 기록, root cause 분석 계획 수립<br>"+
         "4. 남은 spare(TWTA-6) 수 갱신, 향후 fail 대비 emergency 절차 업데이트",
    reason:"복구 완료를 선언하기 전 반드시 <b>지상에서 실제 수신 확인</b>이 필요. TM만으로는 안테나 적용이나 pointing 오류를 검출 못할 수 있음.",
    caution:"⚠️ Root cause 미규명 상태로 종결 금지. 같은 fail이 다른 TWTA에 확산될 수 있음 (예: 공통 EPC 설계 결함). FDIR 팀과 합동 분석 진행."
  }
];

let current = 0;
const stepper = document.getElementById('stepper');
steps.forEach((s,i)=>{
  const btn = document.createElement('button');
  btn.innerHTML = `<b>STEP ${s.n} · ${s.time}</b><br>${s.title}`;
  btn.onclick = () => { current = i; render(); };
  stepper.appendChild(btn);
});

function render(){
  const s = steps[current];
  document.getElementById('stepImg').src = `step${s.n}.png`;
  document.getElementById('vizTitle').textContent = s.vizTitle;
  document.getElementById('vizTime').textContent = s.time;
  document.getElementById('vizState').textContent = s.state;
  document.getElementById('sTitle').textContent = s.title;
  document.getElementById('sDesc').innerHTML = s.desc;
  document.getElementById('sCmd').innerHTML = s.cmd;
  document.getElementById('sTm').innerHTML = s.tm;
  document.getElementById('sOper').innerHTML = s.oper;
  document.getElementById('sReason').innerHTML = s.reason;
  document.getElementById('sCaution').innerHTML = s.caution;
  // activate button
  [...stepper.children].forEach((b,i)=>b.classList.toggle('active', i===current));
  document.getElementById('prev').disabled = current===0;
  document.getElementById('next').disabled = current===steps.length-1;
  document.getElementById('next').textContent = current===steps.length-1 ? '✅ 복구 완료' : '다음 단계 ▶';
}

document.getElementById('prev').onclick = ()=>{ if(current>0){current--;render();} };
document.getElementById('next').onclick = ()=>{ if(current<steps.length-1){current++;render();} };
document.addEventListener('keydown', e => {
  if(e.key==='ArrowLeft'  && current>0){current--;render();}
  if(e.key==='ArrowRight' && current<steps.length-1){current++;render();}
});

render();
</script>
</body>
</html>
